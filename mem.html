<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内存占用较大的演示页面</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0b0e14;
            font-family: 'Segoe UI', system-ui, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #e3e6f0;
            padding: 1rem;
        }

        .stats-panel {
            position: sticky;
            top: 10px;
            z-index: 100;
            background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #2e3a4a;
            border-radius: 40px;
            padding: 0.9rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-weight: 500;
        }

        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .stat-label {
            color: #8899bb;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .stat-value {
            color: #b7e1fa;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Fira Code', monospace;
        }

        .unit {
            color: #5f7a9c;
            font-size: 0.9rem;
            margin-left: 2px;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin: 0.5rem 0 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: #1e2a3a;
            border: 1px solid #3f556b;
            color: #dbeafe;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            letter-spacing: 0.3px;
        }

        button:hover {
            background: #2d4057;
            border-color: #6c8bb8;
            transform: scale(1.02);
        }

        button.warning {
            background: #4a2c2c;
            border-color: #a15a5a;
            color: #ffcfcf;
        }

        button.warning:hover {
            background: #6b3e3e;
        }

        .memory-note {
            background: #131d29;
            border-left: 6px solid #5f9ea0;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            color: #b4c8e9;
            max-width: 800px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: inset 0 0 10px #00000055;
        }

        /* 巨型网格 —— 主要的内存占用区域 */
        .grid-container {
            width: 100%;
            max-width: 1800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 60px;
        }

        .grid-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }

        /* 每个单元格都包含一个大型数据对象、SVG和文本 */
        .memory-cell {
            width: 260px;
            min-width: 240px;
            background: linear-gradient(145deg, #16212e, #0e1722);
            border-radius: 28px;
            border: 1px solid #2b4b67;
            padding: 1.2rem 0.8rem 0.8rem 0.8rem;
            box-shadow: 0 15px 20px -10px black;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.1s;
            word-break: break-word;
        }

        .cell-svg {
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 0 4px #5f9ea0);
        }

        .cell-content {
            width: 100%;
            background: #0d1a24c0;
            border-radius: 16px;
            padding: 12px 6px;
            margin-top: 6px;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.6;
            color: #b8d4e7;
            border: 1px dashed #306480;
            max-height: 160px;
            overflow: auto;
            text-overflow: ellipsis;
            box-shadow: inset 0 0 15px #0000007a;
        }

        /* 预置一些隐藏的数据持有者——额外的大对象 */
        #hidden-data-store {
            display: none;
        }

        footer {
            margin-top: 50px;
            color: #596f89;
        }
    </style>
</head>
<body>

    <div class="stats-panel" id="statsPanel">
        <div class="stat-item"><span class="stat-label">已用堆 (JS)</span><span class="stat-value" id="jsHeap">?</span><span class="unit">MB</span></div>
        <div class="stat-item"><span class="stat-label">总DOM节点</span><span class="stat-value" id="domCount">?</span><span class="unit">个</span></div>
        <div class="stat-item"><span class="stat-label">网格单元</span><span class="stat-value" id="cellCount">0</span><span class="unit">cell</span></div>
        <div class="stat-item"><span class="stat-label">大对象缓存</span><span class="stat-value" id="cachedObjects">0</span><span class="unit">项</span></div>
    </div>

    <div class="memory-note">
        💾 本页面通过大量 <strong>高精度SVG + 冗长字符串 + 巨型数组 + 闭包持有</strong> 占用内存。<br>
        内存压力越大，统计数值越高。如果页面变卡或者崩溃，属于预期效果。
    </div>

    <div class="action-buttons">
        <button id="addRowBtn">➕ 添加一行 (增加约 8~12 MB)</button>
        <button id="addFiveRowBtn">🚀 添加五行 (暴力占用)</button>
        <button id="removeHalfBtn" class="warning">✂️ 释放一半内存 (移除一半单元格)</button>
        <button id="cleanAllBtn">🧹 重置所有 (尽量恢复)</button>
    </div>

    <!-- 这里会动态插入网格 -->
    <div class="grid-container" id="gridContainer"></div>

    <!-- 隐藏的巨型对象存储器（用于额外内存占用）-->
    <div id="hidden-data-store"></div>

    <footer>⚠️ 警告: 此页面可能耗尽内存导致标签页崩溃，请勿用于重要工作。</footer>

    <script>
        (function() {
            // -------------------- 工具函数: 生成大型随机数据对象 --------------------
            function generateHugeString(seed) {
                // 每个字符串大约 20k 字符 (20KB)
                const base = '☁️❄️🔥💧🌍⭐🌙🌞🪐🌀🌈⏳🎈🧩📦🧬🔬🛸🚀' + seed + ' ' + Math.random().toString(36).repeat(300);
                // 重复多次构建~20KB
                let str = '';
                for (let i = 0; i < 18; i++) {  // 大约 18 * 1.1k = 20k
                    str += base + ' ✦ ' + i + ' ✦ ';
                }
                // 再附加一个巨大的数字数组转字符串 (额外)
                const arr = new Array(300).fill(0).map((_, idx) => (idx * 997) % 10000);
                str += ':::' + arr.join('|');
                return str;
            }

            // 生成一个内部带有大量文本节点的SVG (同时增加DOM开销)
            function createLargeSvg(seed) {
                const svgNs = "http://www.w3.org/2000/svg";
                const svg = document.createElementNS(svgNs, "svg");
                svg.setAttribute("viewBox", "0 0 100 100");
                // 增加复杂的路径和纹理
                for (let i=0; i<25; i++) {
                    const circle = document.createElementNS(svgNs, "circle");
                    const r = 15 + i*2;
                    circle.setAttribute("cx", 30 + (i*3 % 40));
                    circle.setAttribute("cy", 30 + (i*5 % 40));
                    circle.setAttribute("r", "7");
                    circle.setAttribute("fill", `hsl(${i*30 % 360}, 70%, 60%)`);
                    circle.setAttribute("stroke", "#333");
                    circle.setAttribute("stroke-width", "1.2");
                    svg.appendChild(circle);
                }
                // 加入一些文本 (长字符串)
                for (let t=0; t<8; t++) {
                    const text = document.createElementNS(svgNs, "text");
                    text.setAttribute("x", 10 + t*10);
                    text.setAttribute("y", 80);
                    text.setAttribute("font-size", "3");
                    text.setAttribute("fill", "white");
                    text.textContent = "⬤" + t.toString(16).repeat(12);  // 小文本节点但多重复
                    svg.appendChild(text);
                }
                // 添加10个不可见但复杂的路径 (增加内存)
                for (let p=0; p<10; p++) {
                    const path = document.createElementNS(svgNs, "path");
                    path.setAttribute("d", `M ${p*7},20 Q ${p*7+30},40 ${p*7},70 T ${p*7+15},90`);
                    path.setAttribute("stroke", "#aaa");
                    path.setAttribute("fill", "none");
                    svg.appendChild(path);
                }
                return svg;
            }

            // 巨型数组缓冲区 (保存在闭包或hidden存储里)  为了额外占内存
            let bigCache = [];

            // 存储生成的单元格数据，便于统计及释放
            let cellElements = [];         // 存放所有单元格DOM
            let hiddenObjectsBlobs = [];    // 存放额外的大对象(闭包/数组)

            // 统计DOM节点个数 (粗略)
            function updateDomCount() {
                const count = document.getElementsByTagName('*').length;
                document.getElementById('domCount').innerText = count.toLocaleString();
            }

            // 更新内存显示 (performance memory 需要chrome, edge等)
            function updateMemoryStats() {
                const heapElem = document.getElementById('jsHeap');
                if (window.performance && performance.memory) {
                    const used = performance.memory.usedJSHeapSize;
                    heapElem.innerText = (used / 1024 / 1024).toFixed(1);
                } else {
                    heapElem.innerText = 'N/A';
                }

                document.getElementById('cellCount').innerText = cellElements.length;

                document.getElementById('cachedObjects').innerText = hiddenObjectsBlobs.length;

                updateDomCount();
                requestAnimationFrame(updateMemoryStats);
            }

            // 创建一个单元格（包含大型DOM、SVG、长字符串、闭包引用）
            function createMemoryCell(uniqueId) {
                const cellDiv = document.createElement('div');
                cellDiv.className = 'memory-cell';

                // SVG 区域
                const svgDiv = document.createElement('div');
                svgDiv.className = 'cell-svg';
                const svgElement = createLargeSvg(uniqueId);
                svgDiv.appendChild(svgElement);
                cellDiv.appendChild(svgDiv);

                // 文本内容区域：放置一个超长的字符串 + 巨大的数组序列化
                const contentDiv = document.createElement('div');
                contentDiv.className = 'cell-content';

                // 生成两个大字符串
                const hugeStr1 = generateHugeString(uniqueId + 'A');
                const hugeStr2 = generateHugeString(uniqueId + 'B');
                // 再生成一个大型的嵌套对象转换成JSON字符串
                const largeObject = {
                    id: uniqueId,
                    timestamp: Date.now(),
                    payload: new Array(800).fill(0).map((_, idx) => ({ index: idx, value: Math.random() * 10000, tag: 'cell' + uniqueId }))
                };
                const jsonStr = JSON.stringify(largeObject);

                // 把它们全部塞进innerText (innerText也会占用额外的内存)
                contentDiv.innerText = hugeStr1.slice(0, 300) + '\n...\n' + hugeStr2.slice(0, 300) + '\n...json[' + jsonStr.length + ' chars]';

                // 但是为了内存更大，我们将整个大字符串作为额外的属性存储 (dataset或者直接作为属性)
                // 这样即使innerText截断了，这些字符串仍然被DOM元素持有
                cellDiv.dataset.hugeStr1 = hugeStr1;      // 20k
                cellDiv.dataset.hugeStr2 = hugeStr2;      // 20k
                cellDiv.dataset.hugeJson = jsonStr;       // 几十k

                // 另外在内部追加一个隐藏的span，存放冗长文本
                const hiddenSpan = document.createElement('span');
                hiddenSpan.style.display = 'none';
                hiddenSpan.textContent = hugeStr1 + hugeStr2 + jsonStr;  // 累加
                cellDiv.appendChild(hiddenSpan);

                // 再添加一些额外的属性节点 (比如用setAttribute存长字符串)
                cellDiv.setAttribute('data-long-attr-1', hugeStr1.slice(0, 2000)); // 适度但也不少
                cellDiv.setAttribute('data-long-attr-2', hugeStr2.slice(0, 2000));

                // 把大量内容存入闭包引用，避免被GC (通过一个数组引用)
                const closureHolder = function() {
                    const bigData = [hugeStr1, hugeStr2, jsonStr, largeObject];
                    return function() {
                        // 什么都不做，只是捕获bigData
                        return bigData.length;
                    };
                }();
                // 将闭包函数引用保存到cellDiv的一个不可枚举属性? 我们用weakmap或者直接存到对象。
                // 为了更可靠占用内存，放入hiddenObjectsBlobs
                hiddenObjectsBlobs.push(closureHolder);

                contentDiv.appendChild(document.createTextNode(' [closure#' + hiddenObjectsBlobs.length + ']'));
                cellDiv.appendChild(contentDiv);

                return cellDiv;
            }

            // 添加一行 (默认每行6个单元格)
            function addRow() {
                const container = document.getElementById('gridContainer');
                const rowDiv = document.createElement('div');
                rowDiv.className = 'grid-row';

                // 一行放6个单元 (可调整)
                for (let i=0; i<6; i++) {
                    const cellId = `cell-${Date.now()}-${Math.random()}-${i}`;
                    const cell = createMemoryCell(cellId);
                    rowDiv.appendChild(cell);
                    cellElements.push(cell);   // 存储到数组
                }

                container.appendChild(rowDiv);

                // 额外再往hidden-data-store扔一个大型ArrayBuffer，占更多内存
                const extraBuffer = new ArrayBuffer(1024 * 50); // 50KB
                const view = new Uint8Array(extraBuffer);
                for (let j=0; j<view.length; j++) {
                    view[j] = j % 256;
                }
                // 将buffer保持在一个数组中，防止GC
                hiddenObjectsBlobs.push(extraBuffer);
                // 再推一个巨型对象
                const giantObj = {};
                for (let k=0; k<30; k++) {
                    giantObj['key'+k] = generateHugeString('hidden'+k);
                }
                hiddenObjectsBlobs.push(giantObj);

                updateDomCount();
            }

            // 添加五行 (快速膨胀)
            function addFiveRows() {
                for (let i=0; i<5; i++) {
                    addRow();
                }
            }

            // 释放一半单元格 (从cellElements中移除一半DOM)
            function releaseHalf() {
                const container = document.getElementById('gridContainer');
                const rows = container.querySelectorAll('.grid-row');
                const totalCells = cellElements.length;
                if (totalCells === 0) return;

                const removeCount = Math.max(1, Math.floor(totalCells / 2));
                for (let i=0; i<removeCount; i++) {
                    if (cellElements.length === 0) break;
                    // 随机移除一个单元格（但为了简单，移除最后一个）
                    const cell = cellElements.pop();
                    if (cell && cell.parentNode) {
                        cell.parentNode.removeChild(cell);
                    }
                }

                // 同时清理掉一部分hiddenObjectsBlobs (随机释放一些)
                if (hiddenObjectsBlobs.length > 10) {
                    const removeBlobCount = Math.floor(hiddenObjectsBlobs.length / 3);
                    hiddenObjectsBlobs.splice(0, removeBlobCount); // 从前移除一部分
                }

                // 清理空行 (如果一行没有单元格，可以移除行)
                rows.forEach(row => {
                    if (row.children.length === 0) {
                        row.remove();
                    }
                });

                updateDomCount();
            }

            // 重置全部 (尽可能释放内存)
            function resetAll() {
                const container = document.getElementById('gridContainer');
                container.innerHTML = '';  // 删除所有网格
                cellElements = [];

                // 清除隐藏的大对象缓存
                hiddenObjectsBlobs = [];

                // 额外强制垃圾回收 (如果可用)
                if (window.gc) {
                    window.gc();
                    window.gc();
                }

                // 清理hidden store里可能的遗留
                document.getElementById('hidden-data-store').innerHTML = '';

                updateDomCount();
            }

            // 初始填充一些数据，让页面一打开就有一定的内存占用
            function initialize() {
                // 添加两行
                addRow();
                addRow();
                // 再额外添加一些独立的大对象
                for (let s=0; s<10; s++) {
                    const buf = new ArrayBuffer(1024 * 120); // 每个120KB
                    hiddenObjectsBlobs.push(buf);
                }
                updateMemoryStats();
            }

            // 绑定按钮
            document.getElementById('addRowBtn').addEventListener('click', addRow);
            document.getElementById('addFiveRowBtn').addEventListener('click', addFiveRows);
            document.getElementById('removeHalfBtn').addEventListener('click', releaseHalf);
            document.getElementById('cleanAllBtn').addEventListener('click', resetAll);

            // 启动内存监控
            updateMemoryStats();

            // 页面加载后初始化
            window.addEventListener('load', () => {
                initialize();
            });

        })();
    </script>
</body>
</html>
