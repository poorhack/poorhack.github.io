<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>📳 振动测试 · navigator.vibrate 实验室</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(145deg, #f2f5fa 0%, #e6ecf5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 30px 50px rgba(0, 10, 30, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            max-width: 500px;
            width: 100%;
            padding: 32px 24px 40px 24px;
            transition: all 0.2s ease;
        }
        h1 {
            margin: 0 0 8px 0;
            font-weight: 600;
            font-size: 2.1rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1d2b3e, #2c3e5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 span {
            font-size: 2.4rem;
        }
        .sub {
            color: #3e4f6b;
            font-size: 1rem;
            font-weight: 400;
            margin: 0 0 28px 4px;
            border-left: 4px solid #5671a0;
            padding-left: 18px;
            background: rgba(255,255,255,0.4);
            border-radius: 0 20px 20px 0;
            line-height: 1.4;
        }
        .status-panel {
            background: rgba(10, 20, 35, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 18px 24px;
            margin-bottom: 32px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,240,0.25);
            box-shadow: 0 8px 12px -6px rgba(0,0,0,0.4);
        }
        .vibe-icon {
            background: #ffd966;
            border-radius: 60px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #1f2a3f;
            box-shadow: 0 0 0 2px rgba(255,255,220,0.8);
        }
        .support-badge {
            font-weight: 600;
            background: #2f4b7c;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: inset 0 -2px 0 #0f1a2b;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 24px;
        }
        .vibe-btn {
            background: rgba(255, 255, 255, 0.75);
            border: none;
            border-radius: 60px;
            padding: 22px 8px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e2b40;
            backdrop-filter: blur(6px);
            box-shadow: 0 15px 25px -10px rgba(0,20,50,0.3), 0 4px 8px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.7) inset;
            transition: all 0.1s cubic-bezier(0.2, 0.9, 0.3, 1.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.3;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .vibe-btn:active {
            transform: scale(0.96);
            box-shadow: 0 5px 12px -5px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,215,100,0.6) inset;
            background: rgba(255, 255, 255, 0.9);
        }
        .vibe-btn.disabled,
        .vibe-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(1);
        }
        .btn-label {
            font-size: 1.1rem;
            font-weight: 500;
            background: rgba(0,20,50,0.08);
            padding: 5px 14px;
            border-radius: 60px;
            margin-top: 8px;
            color: #2e405b;
        }
        .long-btn {
            background: rgba(210, 230, 255, 0.8);
        }
        .pattern-btn {
            background: rgba(220, 240, 210, 0.8);
        }
        .stop-btn {
            background: rgba(255, 210, 210, 0.8);
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
            gap: 16px;
            padding: 18px;
            color: #8b2c2c;
        }
        .stop-btn .btn-label {
            background: rgba(140, 30, 30, 0.1);
            color: #a13a3a;
            margin-top: 0;
        }
        .footer-note {
            margin-top: 30px;
            background: rgba(255,255,235,0.7);
            border-radius: 28px;
            padding: 18px 24px;
            font-size: 0.95rem;
            color: #1f3349;
            border: 1px solid rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .footnote {
            font-size: 0.88rem;
            color: #3f5170;
        }
        .pill {
            background: #2e4a3e;
            color: #d9ffd0;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        hr {
            border: none;
            height: 1px;
            background: rgba(0,0,0,0.1);
            margin: 24px 0 12px;
        }
        @media (max-width: 400px) {
            .card { padding: 20px 16px; }
            .vibe-btn { font-size: 1.2rem; padding: 18px 4px; }
            .btn-label { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="card" role="main" aria-label="振动测试面板">
        <h1>
            <span>📳</span> Vibe test
        </h1>
        <div class="sub">
            navigator.vibrate · 短/长/节奏/取消
        </div>

        <!-- 振动支持状态 + 图标 -->
        <div class="status-panel" id="statusPanel">
            <div class="vibe-icon" aria-hidden="true">📳</div>
            <div id="supportMessage" class="support-badge">检测中...</div>
        </div>

        <!-- 主按钮网格 -->
        <div class="button-grid">
            <!-- 短振动 200ms -->
            <button class="vibe-btn" id="btnShort" aria-label="振动200毫秒">
                <span>⚡</span> 短振
                <span class="btn-label">200ms</span>
            </button>
            <!-- 长振动 800ms -->
            <button class="vibe-btn long-btn" id="btnLong" aria-label="振动800毫秒">
                <span>🔴</span> 长振
                <span class="btn-label">800ms</span>
            </button>
            <!-- 节奏振动：两次短振 +  pause + 长振 经典SOS风格但友好一点 -->
            <button class="vibe-btn pattern-btn" id="btnPattern" aria-label="节奏振动模式：短-短-长">
                <span>〽️</span> 节奏
                <span class="btn-label">短·短·长</span>
            </button>
            <!-- 节奏振动 第二种：蜂鸣三连 方便展示更丰富的模式 -->
            <button class="vibe-btn pattern-btn" id="btnPattern2" aria-label="节奏振动模式：三重脉冲">
                <span>🎶</span> 脉冲
                <span class="btn-label">三连·停顿·三连</span>
            </button>
        </div>

        <!-- 停止 / 取消振动按钮 (横跨两列) 突出重要 -->
        <button class="vibe-btn stop-btn" id="btnStop" aria-label="取消任何进行中的振动">
            <span>⏹️</span> 立即停止振动
            <span class="btn-label">取消</span>
        </button>

        <!-- 额外说明与提示 -->
        <div class="footer-note">
            <span class="footnote">
                <span>📱 需要设备支持振动</span><br>
                <span style="font-size:0.8rem;">振动权限可能需手动开启</span>
            </span>
            <span class="pill" id="vibeState">待命</span>
        </div>
        <hr>
        <div style="font-size:0.85rem; text-align:center; color:#4d6079; display:flex; gap:12px; justify-content:center;">
            <span>⚠️ 部分浏览器无振动能力</span>
            <span>·</span>
            <span id="apiIndicator">navigator.vibrate ✓</span>
        </div>
    </div>

    <script>
        (function() {
            // 检测vibrate兼容函数 (支持前缀还是标准)
            const vibrateSupported = 'vibrate' in navigator;

            // 更新UI指示支持情况
            const supportMsgEl = document.getElementById('supportMessage');
            const vibeStateEl = document.getElementById('vibeState');
            const apiIndicatorEl = document.getElementById('apiIndicator');

            // 获取所有操作按钮
            const btnShort = document.getElementById('btnShort');
            const btnLong = document.getElementById('btnLong');
            const btnPattern = document.getElementById('btnPattern');
            const btnPattern2 = document.getElementById('btnPattern2');
            const btnStop = document.getElementById('btnStop');

            // 显示振动状态的函数
            function setVibeState(text, isActive = false) {
                if (vibeStateEl) {
                    vibeStateEl.innerText = text;
                    if (isActive) {
                        vibeStateEl.style.background = '#a63e3e';
                        vibeStateEl.style.color = '#ffe1e1';
                    } else {
                        vibeStateEl.style.background = '#2e4a3e';
                        vibeStateEl.style.color = '#d9ffd0';
                    }
                }
            }

            // 根据支持情况禁用按钮或更新样式
            if (!vibrateSupported) {
                supportMsgEl.innerText = '❌ 不支持振动';
                supportMsgEl.style.background = '#5f3c3c';
                apiIndicatorEl.innerText = 'navigator.vibrate ✗ 不支持';
                setVibeState('不可用', false);

                // 禁用所有振动按钮 (但是保留停止按钮并给提示)
                const allBtns = [btnShort, btnLong, btnPattern, btnPattern2, btnStop];
                allBtns.forEach(btn => {
                    if (btn) {
                        btn.disabled = true;
                        btn.classList.add('disabled');
                        btn.title = '当前浏览器不支持振动';
                    }
                });
                // 停止按钮改为仅提示
                if (btnStop) {
                    btnStop.innerHTML = `<span>⚠️</span> 不支持振动 <span class="btn-label">无API</span>`;
                }
            } else {
                supportMsgEl.innerText = '✅ 振动可用';
                supportMsgEl.style.background = '#1f5f3c';
                apiIndicatorEl.innerText = 'navigator.vibrate ✓ 就绪';
                setVibeState('待命', false);

                // 工具函数：安全调用振动，并捕获异常 (部分浏览器可能因为权限、无用户手势等抛出)
                function safeVibrate(pattern) {
                    try {
                        // 如果输入是数字，转为单成员数组
                        const vibrationPattern = Array.isArray(pattern) ? pattern : [pattern];
                        // 调用振动
                        const result = navigator.vibrate(vibrationPattern);
                        if (result === false) {
                            console.warn('振动被浏览器阻止（可能缺少用户交互或振动被否决）');
                            setVibeState('振动被拒', false);
                        } else {
                            // 一般result为true, 但只有非空pattern才改变状态
                            if (vibrationPattern.length > 0 && !(vibrationPattern.length === 1 && vibrationPattern[0] === 0)) {
                                setVibeState('振动中...', true);
                            } else {
                                // 停止振动或空pattern，恢复到待命
                                setVibeState('已停止', false);
                            }
                        }
                    } catch (e) {
                        console.warn('振动调用异常:', e);
                        setVibeState('异常', false);
                        alert('振动执行时出现异常: ' + e.message);
                    }
                }

                // 停止振动 (传入0或空数组)
                function stopVibration() {
                    try {
                        navigator.vibrate(0);
                        setVibeState('已停止', false);
                    } catch (e) {
                        console.warn(e);
                        setVibeState('停止失败', false);
                    }
                }

                // 由于振动可能自动结束，添加定时器更新状态 (粗略)
                // 最长振动是 pattern2 大概 2.4秒，我们做被动更新
                function updateStateAfterPattern(durationMs) {
                    setTimeout(() => {
                        // 检查是否仍在振动？无法直接查询，但如果没有任何后续振动，假设停止了
                        setVibeState('待命', false);
                    }, durationMs + 100); // 加一点余量
                }

                // ----- 按钮绑定 -----
                // 短振 200ms
                btnShort.addEventListener('click', (e) => {
                    e.preventDefault();
                    safeVibrate(200);
                    updateStateAfterPattern(200);
                });

                // 长振 800ms
                btnLong.addEventListener('click', (e) => {
                    e.preventDefault();
                    safeVibrate(800);
                    updateStateAfterPattern(800);
                });

                // 节奏1: 短·短·长  [200, 150, 200, 150, 600]  (振动-暂停-振动-暂停-振动)
                btnPattern.addEventListener('click', (e) => {
                    e.preventDefault();
                    // 模式: 振200ms, 停150ms, 振200ms, 停150ms, 振600ms
                    safeVibrate([200, 150, 200, 150, 600]);
                    // 总耗时 = 200+150+200+150+600 = 1300ms
                    updateStateAfterPattern(1300);
                });

                // 节奏2: 三连脉冲+停顿+三连 模仿一些通知
                //  [100, 80, 100, 80, 100, 400, 150, 100, 150, 100, 150] 
                // 更清晰点: 振100停80振100停80振100 然后长停400 然后 振150停100振150停100振150
                btnPattern2.addEventListener('click', (e) => {
                    e.preventDefault();
                    safeVibrate([100, 80, 100, 80, 100, 400, 150, 100, 150, 100, 150]);
                    // 总时长 ≈ 100+80+100+80+100+400+150+100+150+100+150 = 1510ms (1.51s)
                    updateStateAfterPattern(1550);
                });

                // 停止振动: 调用0
                btnStop.addEventListener('click', (e) => {
                    e.preventDefault();
                    stopVibration();
                });

                // 额外优化: 页面隐藏时最好自动停止？但不需要，留由用户控制。 但为了保险可以在visibilityChange时停振？
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        // 当页面隐藏，强制停止振动 (很多浏览器自动停，但主动停无伤大雅)
                        try { navigator.vibrate(0); } catch (e) {}
                        setVibeState('页面隐藏', false);
                    }
                });

                // 在页面卸载前也尝试停止振动 (有助于资源释放)
                window.addEventListener('beforeunload', () => {
                    try { navigator.vibrate(0); } catch (e) {}
                });

                // 增加一个微小的点击波纹效果——只是UI反馈 (防止用户误以为没点到)
                // 所有按钮默认已经启用，点击振动同时显示状态变化
            }

            // 附加小功能：点击按钮时，如果支持，按钮自己可能有细微样式变化，已经通过CSS完成
            // 处理复制/粘贴不影响
        })();
    </script>

    <!-- 简单说明：如果浏览器不支持振动，所有振动按钮被禁用并出现提示 -->
    <!-- 设计干净，适合移动触屏 -->
</body>
</html>
