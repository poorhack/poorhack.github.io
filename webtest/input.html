<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>事件上报系统 - 含键盘事件 | 纯文本顶行</title>
    <style>
        /* 彻底移除所有格式：无margin、无padding、无边框、无背景色、无任何装饰 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: 'Courier New', 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            color: black;
            line-height: 1.4;
        }

        /* 容器：无任何外边距内边距 */
        .container {
            max-width: 1200px;
            margin: 0;
            padding: 0;
        }

        /* 输入框和按钮区域：仅功能性边框，无额外间距 */
        .input-group {
            margin-bottom: 8px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 2px;
        }

        input {
            width: 320px;
            padding: 4px;
            font-family: monospace;
            font-size: 13px;
            border: 1px solid #888;
            background: white;
        }

        button {
            background: #eee;
            border: 1px solid #888;
            padding: 4px 12px;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            margin-top: 6px;
        }

        /* 日志区域：完全顶格，无任何边框背景 */
        .log-area {
            margin-top: 16px;
            padding: 0;
        }

        .log-header {
            margin: 0;
            padding: 0;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .clear-btn {
            background: #ddd;
            border: 1px solid #666;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
            font-family: monospace;
        }

        /* 日志列表容器：无内边距无边框 */
        .event-list {
            margin: 0;
            padding: 0;
            height: 480px;
            overflow-y: auto;
            background: white;
        }

        /* 日志条目：完全顶行，无任何缩进、下划线、背景 */
        .log-item {
            margin: 0;
            padding: 0;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
        }

        .empty-logs {
            margin: 0;
            padding: 4px 0;
            color: #555;
        }

        .info-note {
            margin-top: 8px;
            font-size: 12px;
            padding: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="input-group">
        <label>输入框 (键盘事件会全局上报)</label>
        <input type="text" id="mainInput" placeholder="任意输入，按键将被记录..." autocomplete="off">
    </div>
    <button id="actionButton">主要操作按钮</button>
    
    <div class="log-area">
        <div class="log-header">
            <span>事件上报日志 (click / hover / touch / mousedown/up / keydown)</span>
            <button id="clearLogsBtn" class="clear-btn">清除日志</button>
        </div>
        <div id="eventListContainer" class="event-list">
            <div class="empty-logs">等待事件触发...</div>
        </div>
    </div>
    <div class="info-note">
        上报: 点击 | 鼠标按下/抬起 | 悬停 | 触摸 | 键盘(keydown) — 显示 key 和 code
    </div>
</div>

<script>
    (function() {
        const actionButton = document.getElementById('actionButton');
        const mainInput = document.getElementById('mainInput');
        const clearBtn = document.getElementById('clearLogsBtn');
        const eventContainer = document.getElementById('eventListContainer');
        
        let eventLogs = [];
        const MAX_LOGS = 120;
        
        function getFormattedTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const ms = now.getMilliseconds().toString().padStart(3, '0');
            return `${hours}:${minutes}:${seconds}.${ms}`;
        }
        
        function getElementDescription(element) {
            if (!element) return '未知';
            if (element.id === 'actionButton') return '主按钮';
            if (element.id === 'mainInput') return '输入框';
            if (element.id === 'clearLogsBtn') return '清除按钮';
            if (element === document.body) return 'body';
            if (element.tagName === 'BODY') return 'body';
            if (element.tagName === 'HTML') return 'html';
            let desc = element.tagName.toLowerCase();
            if (element.id) desc += '#' + element.id;
            else if (element.className && typeof element.className === 'string') {
                let cls = element.className.split(' ')[0];
                if (cls && cls !== 'container') desc += '.' + cls;
            }
            return desc;
        }
        
        function getMouseButtonName(button) {
            if (button === 0) return '左键';
            if (button === 1) return '中键';
            if (button === 2) return '右键';
            return '键' + button;
        }
        
        // 核心上报函数 - 生成纯文本行，完全顶格
        function reportEvent(eventType, eventLabel, targetElement, originalEvent = null) {
            let typeTag = '';
            if (eventType === 'click') typeTag = '[CLICK]';
            else if (eventType === 'hover') typeTag = '[HOVER]';
            else if (eventType === 'touch') typeTag = '[TOUCH]';
            else if (eventType === 'mousedown') typeTag = '[MOUSEDOWN]';
            else if (eventType === 'mouseup') typeTag = '[MOUSEUP]';
            else if (eventType === 'keydown') typeTag = '[KEYDOWN]';
            else typeTag = '[EVENT]';
            
            const timestamp = getFormattedTime();
            const elementDesc = getElementDescription(targetElement);
            
            // 坐标信息 (仅鼠标/触摸事件)
            let coordInfo = '';
            if (originalEvent && (eventType !== 'keydown')) {
                let clientX = null, clientY = null;
                if ((eventType === 'click' || eventType === 'mousedown' || eventType === 'mouseup') && originalEvent.clientX !== undefined) {
                    clientX = Math.round(originalEvent.clientX);
                    clientY = Math.round(originalEvent.clientY);
                } else if (eventType === 'touch' && originalEvent.touches && originalEvent.touches.length > 0) {
                    clientX = Math.round(originalEvent.touches[0].clientX);
                    clientY = Math.round(originalEvent.touches[0].clientY);
                } else if (eventType === 'touch' && originalEvent.changedTouches && originalEvent.changedTouches.length > 0) {
                    clientX = Math.round(originalEvent.changedTouches[0].clientX);
                    clientY = Math.round(originalEvent.changedTouches[0].clientY);
                } else if (eventType === 'hover' && originalEvent.clientX !== undefined) {
                    clientX = Math.round(originalEvent.clientX);
                    clientY = Math.round(originalEvent.clientY);
                }
                if (clientX !== null && clientY !== null) {
                    coordInfo = ` (${clientX},${clientY})`;
                }
            }
            
            let detailMsg = eventLabel || elementDesc;
            let buttonInfo = '';
            if ((eventType === 'mousedown' || eventType === 'mouseup') && originalEvent && originalEvent.button !== undefined) {
                buttonInfo = ` ${getMouseButtonName(originalEvent.button)}`;
            }
            
            // 键盘事件特殊处理: 显示 key 和 code
            let keyboardInfo = '';
            if (eventType === 'keydown' && originalEvent) {
                const key = originalEvent.key !== undefined ? originalEvent.key : 'Unknown';
                const code = originalEvent.code !== undefined ? originalEvent.code : 'Unknown';
                // 对特殊字符做转义显示，但保留可读性
                let displayKey = key.length === 1 ? key : key;
                keyboardInfo = ` key="${displayKey}" code="${code}"`;
            }
            
            // 最终日志行: 无任何多余空格缩进，完全顶行
            let logLine = `${timestamp} ${typeTag} ${detailMsg}${buttonInfo}${coordInfo}${keyboardInfo}`;
            
            const logEntry = {
                id: Date.now() + Math.random(),
                line: logLine,
                rawTime: Date.now()
            };
            
            eventLogs.unshift(logEntry);
            if (eventLogs.length > MAX_LOGS) eventLogs.pop();
            renderLogs();
        }
        
        function renderLogs() {
            if (!eventContainer) return;
            if (eventLogs.length === 0) {
                eventContainer.innerHTML = '<div class="empty-logs">等待事件触发...</div>';
                return;
            }
            let html = '';
            for (let i = 0; i < eventLogs.length; i++) {
                // 纯文本行，无任何额外标签内边距
                html += `<div class="log-item">${escapeHtml(eventLogs[i].line)}</div>`;
            }
            eventContainer.innerHTML = html;
            // 滚动到顶部显示最新事件
            if (eventContainer.scrollTo) {
                eventContainer.scrollTo({ top: 0, behavior: 'auto' });
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function clearLogs() {
            eventLogs = [];
            renderLogs();
        }
        
        // ----- 键盘事件 (全局 keydown，上报所有按键) -----
        function onGlobalKeyDown(e) {
            // 避免在输入框内重复上报过于频繁，但依然上报所有按键，这是需求
            const target = e.target;
            let detail = '';
            // 获取按键描述
            const keyName = e.key || 'Unknown';
            const codeName = e.code || 'Unknown';
            if (target === mainInput) {
                detail = `输入框内按键`;
            } else if (target === actionButton) {
                detail = `主按钮上按键`;
            } else if (target.id === 'clearLogsBtn') {
                detail = `清除按钮上按键`;
            } else {
                detail = `全局按键 (焦点:${getElementDescription(target)})`;
            }
            // 上报键盘事件，originalEvent 包含 key/code 信息，reportEvent 内部会提取 keyboardInfo
            reportEvent('keydown', detail, target, e);
            // 注意：不 preventDefault，保证输入框正常输入
        }
        
        // ----- 鼠标事件 -----
        function onGlobalClick(e) {
            let target = e.target;
            let detail = '';
            if (target === actionButton || target.closest?.('#actionButton')) {
                detail = `点击主按钮`;
            } else if (target === mainInput) {
                let val = mainInput.value;
                if (val.length > 40) val = val.substring(0, 40) + '…';
                detail = `点击输入框("${val || '空'}")`;
            } else if (target.id === 'clearLogsBtn') {
                detail = `点击清除按钮`;
            } else {
                let extra = '';
                if (target.innerText && target.innerText.trim().length > 0 && target.innerText.trim().length < 30) {
                    let txt = target.innerText.trim().replace(/\s+/g, ' ');
                    extra = ` 文本:${txt}`;
                }
                detail = `点击 ${getElementDescription(target)}${extra}`;
            }
            reportEvent('click', detail, target, e);
        }
        
        function onGlobalMouseDown(e) {
            let target = e.target;
            let btn = getMouseButtonName(e.button);
            let detail = '';
            if (target === actionButton || target.closest?.('#actionButton')) {
                detail = `主按钮按下${btn}`;
            } else if (target === mainInput) {
                detail = `输入框按下${btn}`;
            } else if (target.id === 'clearLogsBtn') {
                detail = `清除按钮按下${btn}`;
            } else {
                detail = `${getElementDescription(target)}按下${btn}`;
            }
            reportEvent('mousedown', detail, target, e);
        }
        
        function onGlobalMouseUp(e) {
            let target = e.target;
            let btn = getMouseButtonName(e.button);
            let detail = '';
            if (target === actionButton || target.closest?.('#actionButton')) {
                detail = `主按钮抬起${btn}`;
            } else if (target === mainInput) {
                detail = `输入框抬起${btn}`;
            } else if (target.id === 'clearLogsBtn') {
                detail = `清除按钮抬起${btn}`;
            } else {
                detail = `${getElementDescription(target)}抬起${btn}`;
            }
            reportEvent('mouseup', detail, target, e);
        }
        
        // ----- Hover 事件 -----
        function onMouseEnter(e) {
            const target = e.currentTarget;
            let detail = '';
            if (target === actionButton) detail = '悬停主按钮';
            else if (target === mainInput) detail = '悬停输入框';
            else if (target.classList && target.classList.contains('container')) detail = '悬停容器';
            else detail = `悬停${getElementDescription(target)}`;
            reportEvent('hover', detail, target, e);
        }
        
        // ----- 触摸事件 (移动端) -----
        function onTouchStart(e) {
            const target = e.target;
            let detail = '';
            if (target === actionButton || target.closest?.('#actionButton')) detail = '触摸主按钮';
            else if (target === mainInput) detail = '触摸输入框';
            else if (target.id === 'clearLogsBtn') detail = '触摸清除按钮';
            else detail = `触摸${getElementDescription(target)}`;
            reportEvent('touch', detail, target, e);
            
            if (target === actionButton || target.closest?.('#actionButton')) {
                const btn = actionButton;
                const orig = btn.style.background;
                btn.style.background = '#ccc';
                setTimeout(() => { btn.style.background = orig || ''; }, 100);
            }
        }
        
        // ---------- 注册所有事件监听 ----------
        // 键盘事件 (全局捕获，确保所有按键都能上报，包括功能键)
        document.addEventListener('keydown', onGlobalKeyDown);
        
        // 鼠标事件
        document.addEventListener('click', onGlobalClick);
        document.addEventListener('mousedown', onGlobalMouseDown);
        document.addEventListener('mouseup', onGlobalMouseUp);
        
        // Hover 监听
        if (actionButton) actionButton.addEventListener('mouseenter', onMouseEnter);
        if (mainInput) mainInput.addEventListener('mouseenter', onMouseEnter);
        const containerDiv = document.querySelector('.container');
        if (containerDiv) containerDiv.addEventListener('mouseenter', onMouseEnter);
        document.body.addEventListener('mouseenter', function(e) {
            if (e.target === document.body || e.currentTarget === document.body) {
                reportEvent('hover', '悬停body', document.body, e);
            }
        });
        
        // 触摸事件
        document.addEventListener('touchstart', onTouchStart);
        
        // 清除日志按钮
        if (clearBtn) {
            clearBtn.addEventListener('click', function(e) {
                clearLogs();
                e.stopPropagation();
            });
        }
        
        console.log('事件上报已启动 | 支持键盘(keydown)完整上报 key+code | 完全顶行无格式');
    })();
</script>
</body>
</html>
