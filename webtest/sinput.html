<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>软键盘覆盖输入框 Demo</title>
<style>
  * { margin: 0; padding: 0; }
  body { height: 100vh; }

  /* fixed + top 定位在底部，软键盘会覆盖输入框 */
  .dialog {
    position: fixed;
    left: 0;
    top: calc(100vh - 100px);
    width: 100%;
    height: 100px;
    background: #fff;
    border-top: 1px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }
  .dialog input {
    width: 80%;
    height: 36px;
    padding: 0 8px;
    font-size: 16px;
    border: 1px solid #999;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="dialog">
  <input type="text" placeholder="输入后软键盘会覆盖我" />
</div>
</body>
</html>
