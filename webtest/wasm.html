<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasm 特性探测工具</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; padding: 20px; background: #f4f7f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, min-minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { padding: 15px; border-radius: 8px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .supported { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
        .unsupported { background: #ffebee; border-color: #ef9a9a; color: #c62828; }
        .status-icon { font-weight: bold; font-size: 1.2em; }
        .binary-box { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 0.9em; overflow-x: auto; margin: 20px 0; }
        .summary { margin-top: 30px; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>WebAssembly 特性检测</h1>
    
    <p>正在尝试检测以下 Wasm 二进制指令集：</p>
    <div class="binary-box">
        [0, 97, 115, 109, 1, 0, 0, 0, 1, 4, 1, 96, 0, 0, 3, 2, 1, 0, 5, 4, 1, 3, 1, 1, 10, 11, 1, 9, 0, 65, 0, 254, 16, 2, 0, 26, 11]
    </div>

    <div id="results" class="feature-grid">
        </div>

    <div id="final-status" class="summary">
        正在初始化检测...
    </div>
</div>

<script>
    // 模拟你代码中的各个特性检测函数
    const featuresToTest = {
        'SIMD': async () => WebAssembly.validate(new Uint8Array([0, 97, 115, 109, 1, 0, 0, 0, 1, 5, 1, 96, 0, 1, 123, 3, 2, 1, 0, 10, 10, 1, 8, 0, 65, 0, 253, 15, 26, 11])),
        'Threads': async () => typeof SharedArrayBuffer !== 'undefined' && WebAssembly.validate(new Uint8Array([0, 97, 115, 109, 1, 0, 0, 0, 1, 4, 1, 96, 0, 0, 3, 2, 1, 0, 5, 4, 1, 3, 1, 1, 10, 11, 1, 9, 0, 65, 0, 254, 16, 2, 0, 26, 11])),
        'Bulk Memory': async () => WebAssembly.validate(new Uint8Array([0, 97, 115, 109, 1, 0, 0, 0, 1, 4, 1, 96, 0, 0, 3, 2, 1, 0, 10, 14, 1, 12, 0, 65, 0, 65, 0, 65, 0, 252, 10, 0, 0, 11])),
        'BigInt JS-API': async () => typeof BigUint64Array !== 'undefined',
        'Mutable Globals': async () => WebAssembly.validate(new Uint8Array([0, 97, 115, 109, 1, 0, 0, 0, 2, 7, 1, 1, 101, 1, 103, 127, 1]))
    };

    async function runCheck() {
        const resultsContainer = document.getElementById('results');
        const finalStatus = document.getElementById('final-status');
        let unsupportedCount = 0;

        for (const [name, testFn] of Object.entries(featuresToTest)) {
            let isSupported = false;
            try {
                isSupported = await testFn();
            } catch (e) {
                isSupported = false;
            }

            if (!isSupported) unsupportedCount++;

            const card = document.createElement('div');
            card.className = `card ${isSupported ? 'supported' : 'unsupported'}`;
            card.innerHTML = `
                <span>${name}</span>
                <span class="status-icon">${isSupported ? '✓' : '✕'}</span>
            `;
            resultsContainer.appendChild(card);
        }

        if (unsupportedCount === 0) {
            finalStatus.innerText = "🎉 恭喜！您的浏览器完全兼容该环境所需的所有 Wasm 特性。";
            finalStatus.style.background = "#e8f5e9";
            finalStatus.style.color = "#2e7d32";
        } else {
            finalStatus.innerText = `⚠️ 检测到 ${unsupportedCount} 项特性不支持，部分高级功能可能受限。`;
            finalStatus.style.background = "#fff3e0";
            finalStatus.style.color = "#ef6c00";
        }
    }

    window.onload = runCheck;
</script>

</body>
</html>
