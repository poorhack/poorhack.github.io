<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>定时器自动跳转演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        .warning-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .description {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 16px;
        }

        .timer-container {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .timer-label {
            color: #555;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .timer-number {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .timer-unit {
            font-size: 18px;
            color: #888;
            margin-left: 5px;
        }

        .target-url {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 25px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            color: #2c3e50;
            border: 1px solid #e0e0e0;
        }

        .target-url strong {
            color: #e74c3c;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-cancel {
            background: #e74c3c;
            color: white;
        }

        .btn-cancel:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        .btn-reset {
            background: #3498db;
            color: white;
        }

        .btn-reset:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .warning-note {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px;
            border-radius: 6px;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #27ae60;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            .timer-number {
                font-size: 36px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning-icon">
            ⏰
        </div>
        <h1>定时器自动跳转演示</h1>
        <div class="description">
            此页面演示使用定时器实现自动跳转功能<br>
            倒计时结束后将自动跳转到目标网页
        </div>
        
        <div class="timer-container">
            <div class="timer-label">⏱️ 倒计时剩余时间</div>
            <div class="timer-number" id="countdownDisplay">5</div>
            <div class="timer-unit">秒后自动跳转</div>
        </div>
        
        <div class="target-url">
            <strong>🎯 目标地址：</strong><br>
            https://www.example.com/security_demo
        </div>
        
        <div class="button-group">
            <button class="btn btn-cancel" id="cancelBtn">❌ 取消跳转</button>
            <button class="btn btn-reset" id="resetBtn">🔄 重置定时器</button>
        </div>
        
        <div class="status" id="statusMsg">
            ⏳ 定时器已启动，等待跳转...
        </div>
        
        <div class="warning-note">
            ⚠️ 技术演示说明：本页面仅使用 setTimeout 定时器实现自动跳转，<br>
            无其他跳转机制（无 meta refresh、无 location 即时跳转）。<br>
            用于安全研究和教育目的，请勿用于非法用途。
        </div>
    </div>

    <script>
        (function() {
            "use strict";
            
            // ============================================================
            // 定时器自动跳转演示
            // 仅使用定时器(setTimeout)实现超时触发跳转
            // 无其他任何自动跳转机制（无 meta 刷新、无立即 location 跳转）
            // ============================================================
            
            // 配置参数
            const TARGET_URL = 'https://www.example.com/security_demo';  // 跳转目标地址（使用 example.com 安全域名）
            const DEFAULT_TIMEOUT_SECONDS = 5;  // 默认倒计时秒数
            
            // 全局变量
            let timerId = null;           // 定时器ID
            let countdownInterval = null;  // 倒计时更新定时器ID
            let currentSeconds = DEFAULT_TIMEOUT_SECONDS;  // 当前剩余秒数
            let isRedirectCancelled = false;  // 是否已取消跳转
            
            // DOM 元素
            const countdownDisplay = document.getElementById('countdownDisplay');
            const cancelBtn = document.getElementById('cancelBtn');
            const resetBtn = document.getElementById('resetBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            // ============================================================
            // 核心跳转函数：使用定时器触发跳转
            // ============================================================
            function performRedirect() {
                // 检查是否已被取消
                if (isRedirectCancelled) {
                    console.log('[定时器] 跳转已被取消，不执行跳转');
                    return;
                }
                
                // 执行跳转 - 仅使用 location.href
                try {
                    console.log(`[定时器] 倒计时结束，正在跳转到: ${TARGET_URL}`);
                    statusMsg.innerHTML = '🚀 正在跳转到目标页面...';
                    statusMsg.style.color = '#e74c3c';
                    
                    // 使用定时器跳转的核心方法
                    window.location.href = TARGET_URL;
                    
                    // 注意：由于 location.href 会立即开始导航，后续代码可能不会执行
                    // 但为了演示完整性，保留 fallback 逻辑
                } catch (error) {
                    console.error('[定时器] 跳转失败:', error);
                    statusMsg.innerHTML = '❌ 跳转失败，请检查网络或目标地址';
                    statusMsg.style.color = '#e74c3c';
                }
            }
            
            // ============================================================
            // 启动定时器（核心功能）
            // ============================================================
            function startTimer(seconds) {
                // 清除之前的定时器
                clearTimer();
                
                // 重置取消标志
                isRedirectCancelled = false;
                
                // 设置当前秒数
                currentSeconds = seconds;
                updateCountdownDisplay();
                
                // 启动倒计时显示更新（每1秒更新一次）
                countdownInterval = setInterval(() => {
                    if (!isRedirectCancelled && currentSeconds > 0) {
                        currentSeconds--;
                        updateCountdownDisplay();
                        
                        // 更新状态消息
                        if (currentSeconds > 0) {
                            statusMsg.innerHTML = `⏳ 倒计时 ${currentSeconds} 秒后自动跳转...`;
                            statusMsg.style.color = '#27ae60';
                        }
                    } else if (currentSeconds === 0 && !isRedirectCancelled) {
                        // 倒计时结束，清除倒计时显示定时器
                        if (countdownInterval) {
                            clearInterval(countdownInterval);
                            countdownInterval = null;
                        }
                    }
                }, 1000);
                
                // 【核心】设置主定时器：超时后执行跳转
                timerId = setTimeout(() => {
                    // 倒计时结束后执行跳转
                    if (!isRedirectCancelled) {
                        performRedirect();
                    }
                    // 清除倒计时显示定时器
                    if (countdownInterval) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                    }
                }, seconds * 1000);
                
                console.log(`[定时器] 已启动，将在 ${seconds} 秒后跳转到 ${TARGET_URL}`);
            }
            
            // ============================================================
            // 更新倒计时显示
            // ============================================================
            function updateCountdownDisplay() {
                if (countdownDisplay) {
                    countdownDisplay.textContent = currentSeconds;
                    
                    // 根据剩余时间改变颜色
                    if (currentSeconds <= 2) {
                        countdownDisplay.style.color = '#e74c3c';
                        countdownDisplay.style.fontSize = '52px';
                    } else if (currentSeconds <= 4) {
                        countdownDisplay.style.color = '#f39c12';
                        countdownDisplay.style.fontSize = '48px';
                    } else {
                        countdownDisplay.style.color = '#2c3e50';
                        countdownDisplay.style.fontSize = '48px';
                    }
                }
            }
            
            // ============================================================
            // 清除所有定时器
            // ============================================================
            function clearTimer() {
                if (timerId) {
                    clearTimeout(timerId);
                    timerId = null;
                    console.log('[定时器] 已清除主定时器');
                }
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    console.log('[定时器] 已清除倒计时显示定时器');
                }
            }
            
            // ============================================================
            // 取消跳转
            // ============================================================
            function cancelRedirect() {
                if (!isRedirectCancelled) {
                    isRedirectCancelled = true;
                    clearTimer();
                    statusMsg.innerHTML = '✅ 已取消自动跳转，定时器已停止';
                    statusMsg.style.color = '#3498db';
                    countdownDisplay.textContent = '0';
                    countdownDisplay.style.color = '#95a5a6';
                    console.log('[定时器] 用户取消了自动跳转');
                    
                    // 可选：显示提示框
                    // alert('已取消自动跳转');
                } else {
                    statusMsg.innerHTML = '⚠️ 跳转已被取消，无需重复操作';
                    statusMsg.style.color = '#f39c12';
                }
            }
            
            // ============================================================
            // 重置定时器
            // ============================================================
            function resetTimer() {
                // 清除现有定时器
                clearTimer();
                
                // 重置状态
                isRedirectCancelled = false;
                currentSeconds = DEFAULT_TIMEOUT_SECONDS;
                
                // 重新启动定时器
                startTimer(DEFAULT_TIMEOUT_SECONDS);
                
                statusMsg.innerHTML = `🔄 定时器已重置，将在 ${DEFAULT_TIMEOUT_SECONDS} 秒后跳转`;
                statusMsg.style.color = '#27ae60';
                console.log('[定时器] 用户重置了定时器');
            }
            
            // ============================================================
            // 页面卸载时的清理（可选）
            // ============================================================
            function cleanup() {
                if (timerId || countdownInterval) {
                    clearTimer();
                    console.log('[定时器] 页面卸载，已清理所有定时器');
                }
            }
            
            // ============================================================
            // 事件监听器绑定
            // ============================================================
            if (cancelBtn) {
                cancelBtn.addEventListener('click', cancelRedirect);
            }
            
            if (resetBtn) {
                resetBtn.addEventListener('click', resetTimer);
            }
            
            // 页面关闭或刷新时清理定时器（避免后台继续运行）
            window.addEventListener('beforeunload', cleanup);
            
            // ============================================================
            // 初始化：启动定时器（演示仅使用定时器跳转）
            // ============================================================
            console.log('[演示页面] 初始化完成，仅使用定时器实现自动跳转');
            console.log('[演示页面] 目标地址: ' + TARGET_URL);
            console.log('[演示页面] 倒计时: ' + DEFAULT_TIMEOUT_SECONDS + ' 秒');
            
            // 启动定时器 - 这是唯一触发跳转的机制
            startTimer(DEFAULT_TIMEOUT_SECONDS);
            
            // 额外说明：本页面没有任何其他自动跳转机制
            // - 无 meta refresh 标签
            // - 无立即执行的 location 跳转
            // - 无事件监听的自动跳转
            // - 仅通过 setTimeout 定时器触发跳转
        })();
    </script>
    
    <!-- 确保没有任何 meta refresh 标签干扰 -->
    <!-- 本页面完全依赖 JavaScript 定时器实现跳转，无任何后备自动跳转机制 -->
</body>
</html>
